<!DOCTYPE html>
<!-- dashboard/index.html -->
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FreightPilot — Baton</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="config.js"></script>
  <style>
    body { font-family: 'Inter', sans-serif; background: #f8fafc; }
    .spinner { display: inline-block; width: 1em; height: 1em; border: 2px solid currentColor; border-right-color: transparent; border-radius: 50%; animation: spin 0.6s linear infinite; vertical-align: middle; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useCallback } = React;

// ─── Utilities ──────────────────────────────────────────────────────────────

function fmt(val, decimals = 0) {
  if (val == null) return '—';
  return Number(val).toLocaleString('en-US', { minimumFractionDigits: decimals, maximumFractionDigits: decimals });
}

function fmtUSD(val) {
  if (val == null) return '—';
  return '$' + fmt(val, 0);
}

function fmtDate(iso) {
  if (!iso) return '—';
  return new Date(iso).toLocaleString('en-US', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
}

function hoursSince(iso) {
  if (!iso) return Infinity;
  return (Date.now() - new Date(iso).getTime()) / 3_600_000;
}

function rowColor(s) {
  if (s.status === 'delayed')                   return 'bg-red-100';
  if (s.carrier_status === 'unresponsive')       return 'bg-orange-100';
  if (s.status !== 'delivered' && hoursSince(s.last_update) > 6) return 'bg-yellow-100';
  if (s.is_anomaly)                              return 'bg-purple-100';
  return 'bg-green-50';
}

function badge(text, color) {
  const map = { red: 'bg-red-100 text-red-700', orange: 'bg-orange-100 text-orange-700', yellow: 'bg-yellow-100 text-yellow-700', purple: 'bg-purple-100 text-purple-700', blue: 'bg-blue-100 text-blue-700', green: 'bg-green-100 text-green-700', gray: 'bg-gray-100 text-gray-600' };
  return <span className={`inline-block px-2 py-0.5 rounded text-xs font-semibold ${map[color] || map.gray}`}>{text}</span>;
}

function exceptionBadge(type) {
  const map = { delayed: ['Delayed', 'red'], silent: ['Silent', 'yellow'], unresponsive: ['Unresponsive', 'orange'], anomaly: ['Anomaly', 'purple'] };
  const [label, color] = map[type] || [type, 'gray'];
  return badge(label, color);
}

// ─── Header ─────────────────────────────────────────────────────────────────

function Header({ health }) {
  const ok = health && health.status === 'ok';
  return (
    <header className="bg-indigo-700 text-white px-6 py-4 flex items-center justify-between shadow-lg">
      <div>
        <h1 className="text-2xl font-bold tracking-tight">FreightPilot</h1>
        <p className="text-indigo-200 text-xs mt-0.5">Baton — A Ryder Technology Lab</p>
      </div>
      <div className="flex items-center gap-3 text-sm">
        <span className={`w-2.5 h-2.5 rounded-full inline-block ${ok ? 'bg-green-400' : 'bg-red-400'}`}></span>
        <span>{ok ? 'All systems operational' : 'Checking…'}</span>
        {health && <span className="text-indigo-300 text-xs">DB: {health.db} · Redis: {health.redis}</span>}
      </div>
    </header>
  );
}

// ─── PipelineMetrics ─────────────────────────────────────────────────────────

function PipelineMetrics() {
  const [data, setData]     = useState(null);
  const [stream, setStream] = useState(null);

  const load = useCallback(() => {
    fetch(`${API_BASE_URL}/pipeline/metrics`)
      .then(r => r.json()).then(d => setData(d.metrics[0] || null)).catch(() => {});
    fetch(`${API_BASE_URL}/pipeline/stream-info`)
      .then(r => r.json()).then(setStream).catch(() => {});
  }, []);

  useEffect(() => { load(); const t = setInterval(load, 10_000); return () => clearInterval(t); }, [load]);

  const m = data || {};
  const s = stream || {};
  const tiles = [
    { label: 'Events/sec',   value: m.events_per_second != null ? fmt(m.events_per_second, 2) : '—' },
    { label: 'Consumer Lag', value: s.consumer_lag != null ? fmt(s.consumer_lag) : '—' },
    { label: 'Latency (ms)', value: m.processing_latency_ms != null ? fmt(m.processing_latency_ms, 1) : '—' },
    { label: 'Stream Len',   value: s.stream_length != null ? fmt(s.stream_length) : '—' },
    { label: 'Exceptions',   value: m.exceptions_detected != null ? fmt(m.exceptions_detected) : '—' },
    { label: 'Anomalies',    value: m.anomalies_detected != null ? fmt(m.anomalies_detected) : '—' },
  ];

  return (
    <section className="mb-6">
      <h2 className="text-sm font-semibold uppercase text-gray-500 mb-2 tracking-wide">Pipeline Metrics <span className="text-gray-400 font-normal normal-case">(auto-refresh 10s)</span></h2>
      <div className="grid grid-cols-3 sm:grid-cols-6 gap-3">
        {tiles.map(t => (
          <div key={t.label} className="bg-white rounded-xl shadow-sm border border-gray-100 p-4 text-center">
            <div className="text-2xl font-bold text-indigo-700">{t.value}</div>
            <div className="text-xs text-gray-500 mt-1">{t.label}</div>
          </div>
        ))}
      </div>
    </section>
  );
}

// ─── RerouteOptions ──────────────────────────────────────────────────────────

function RerouteOptions({ shipmentId }) {
  const [loading, setLoading] = useState(false);
  const [options, setOptions] = useState(null);
  const [error, setError]     = useState(null);

  function propose() {
    setLoading(true); setError(null);
    fetch(`${API_BASE_URL}/reroute/${shipmentId}`, { method: 'POST' })
      .then(r => r.json())
      .then(d => { setOptions(d.reroute_options); setLoading(false); })
      .catch(() => { setError('Failed to fetch reroute options.'); setLoading(false); });
  }

  const riskColor = { low: 'green', medium: 'yellow', high: 'red' };

  return (
    <div className="mt-3">
      {!options && (
        <button onClick={propose} disabled={loading}
          className="flex items-center gap-2 text-sm bg-indigo-600 text-white px-3 py-1.5 rounded-lg hover:bg-indigo-700 disabled:opacity-60 transition">
          {loading ? <span className="spinner"></span> : '🔀'} Propose Reroute
        </button>
      )}
      {error && <p className="text-red-600 text-xs mt-1">{error}</p>}
      {options && (
        <div className="mt-2 grid grid-cols-1 sm:grid-cols-3 gap-2">
          {options.map((o, i) => (
            <div key={i} className="border border-gray-200 rounded-lg p-3 bg-gray-50 text-xs">
              <div className="font-semibold text-gray-700 mb-1">{o.carrier_alt}</div>
              <div className="flex flex-wrap gap-1 mb-1">
                {badge(o.mode_alt, 'blue')}
                {badge('Risk: ' + o.risk_level, riskColor[o.risk_level] || 'gray')}
              </div>
              <div className="text-gray-600">{o.reasoning}</div>
              <div className="mt-1 text-gray-500">
                ETA: <span className="font-medium">{fmt(o.new_eta_hours, 1)}h</span>
                {' · '}Cost Δ: <span className={`font-medium ${o.estimated_cost_delta_usd < 0 ? 'text-green-700' : 'text-red-700'}`}>{fmtUSD(o.estimated_cost_delta_usd)}</span>
              </div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// ─── ExceptionCard ────────────────────────────────────────────────────────────

function ExceptionCard({ exc, onResolved }) {
  const [expanded, setExpanded] = useState(false);
  const [resolving, setResolving] = useState(false);

  function resolve() {
    setResolving(true);
    fetch(`${API_BASE_URL}/resolve/${exc.id}`, { method: 'POST' })
      .then(() => onResolved(exc.id))
      .catch(() => setResolving(false));
  }

  return (
    <div className="bg-white border border-gray-200 rounded-xl shadow-sm overflow-hidden mb-3">
      <div className="flex items-center justify-between px-4 py-3 cursor-pointer hover:bg-gray-50 transition"
           onClick={() => setExpanded(e => !e)}>
        <div className="flex items-center gap-3 min-w-0">
          <span className="text-indigo-500 text-base">{expanded ? '▾' : '▸'}</span>
          <span className="font-mono font-semibold text-sm text-gray-800">{exc.id}</span>
          {exceptionBadge(exc.exception_type)}
          {exc.is_anomaly && exc.exception_type !== 'anomaly' && badge('Anomaly', 'purple')}
          <span className="text-xs text-gray-500 truncate hidden sm:block">{exc.origin_state} → {exc.destination_state}</span>
        </div>
        <div className="flex items-center gap-3 shrink-0 ml-2">
          <span className="font-semibold text-sm text-gray-800">{fmtUSD(exc.freight_value_usd)}</span>
          <button onClick={e => { e.stopPropagation(); resolve(); }} disabled={resolving}
            className="flex items-center gap-1 text-xs bg-green-100 text-green-700 px-2 py-1 rounded hover:bg-green-200 disabled:opacity-60 transition">
            {resolving ? <span className="spinner"></span> : '✓'} Resolve
          </button>
        </div>
      </div>

      {expanded && (
        <div className="border-t border-gray-100 px-4 py-3 bg-gray-50 text-sm">
          <div className="grid grid-cols-2 sm:grid-cols-4 gap-y-2 gap-x-4 text-xs text-gray-600 mb-3">
            <div><span className="text-gray-400">Carrier</span><br/><strong>{exc.carrier_dot}</strong></div>
            <div><span className="text-gray-400">Mode</span><br/><strong>{exc.mode}</strong></div>
            <div><span className="text-gray-400">Commodity</span><br/><strong>{exc.commodity}</strong></div>
            <div><span className="text-gray-400">Status</span><br/><strong>{exc.status}</strong></div>
            <div><span className="text-gray-400">ETA</span><br/><strong>{fmt(exc.eta_hours, 1)}h</strong></div>
            <div><span className="text-gray-400">Predicted ETA</span><br/><strong>{exc.predicted_eta_hours ? fmt(exc.predicted_eta_hours, 1) + 'h' : '—'}</strong></div>
            <div><span className="text-gray-400">Last Update</span><br/><strong>{fmtDate(exc.last_update)}</strong></div>
            <div><span className="text-gray-400">Weight</span><br/><strong>{fmt(exc.weight_tons, 2)} tons</strong></div>
          </div>
          <RerouteOptions shipmentId={exc.id} />
        </div>
      )}
    </div>
  );
}

// ─── ExceptionsPanel ─────────────────────────────────────────────────────────

const EXC_PAGE_SIZE = 25;
const EXC_TYPES = ['', 'delayed', 'unresponsive', 'silent', 'anomaly'];

function ExceptionsPanel() {
  const [exceptions, setExceptions] = useState([]);
  const [loading, setLoading]       = useState(true);
  const [page, setPage]             = useState(0);
  const [filterType, setFilterType] = useState('');
  const [filterMode, setFilterMode] = useState('');

  const load = useCallback(() => {
    fetch(`${API_BASE_URL}/exceptions`)
      .then(r => r.json())
      .then(d => { setExceptions(d.exceptions); setLoading(false); })
      .catch(() => setLoading(false));
  }, []);

  useEffect(() => { load(); const t = setInterval(load, 30_000); return () => clearInterval(t); }, [load]);

  function onResolved(id) {
    setExceptions(ex => ex.filter(e => e.id !== id));
  }

  function onFilterChange(setter) {
    return e => { setter(e.target.value); setPage(0); };
  }

  const filtered = exceptions.filter(e =>
    (!filterType || e.exception_type === filterType) &&
    (!filterMode || e.mode === filterMode)
  );

  // Derive available modes from loaded exceptions
  const availableModes = ['', ...Array.from(new Set(exceptions.map(e => e.mode).filter(Boolean))).sort()];

  const totalPages = Math.ceil(filtered.length / EXC_PAGE_SIZE);
  const pageItems  = filtered.slice(page * EXC_PAGE_SIZE, (page + 1) * EXC_PAGE_SIZE);

  const selectCls = "text-sm border border-gray-200 rounded-lg px-2 py-1 bg-white focus:outline-none focus:ring-2 focus:ring-indigo-300";

  return (
    <section className="mb-8">
      <div className="flex flex-wrap items-center justify-between gap-3 mb-3">
        <h2 className="text-sm font-semibold uppercase text-gray-500 tracking-wide">
          Exceptions {!loading && (
            <span className="text-indigo-600">
              ({filtered.length}{filtered.length !== exceptions.length ? ` of ${exceptions.length}` : ''})
            </span>
          )}
        </h2>
        <div className="flex gap-2">
          <select value={filterType} onChange={onFilterChange(setFilterType)} className={selectCls}>
            {EXC_TYPES.map(t => <option key={t} value={t}>{t || 'All Types'}</option>)}
          </select>
          <select value={filterMode} onChange={onFilterChange(setFilterMode)} className={selectCls}>
            {availableModes.map(m => <option key={m} value={m}>{m || 'All Modes'}</option>)}
          </select>
          {(filterType || filterMode) && (
            <button onClick={() => { setFilterType(''); setFilterMode(''); setPage(0); }}
              className="text-xs text-gray-400 hover:text-gray-700 px-2 py-1 border border-gray-200 rounded-lg bg-white transition">
              Clear
            </button>
          )}
        </div>
      </div>
      {loading && <div className="text-gray-400 text-sm py-4 text-center">Loading… <span className="spinner"></span></div>}
      {!loading && filtered.length === 0 && (
        <div className="text-green-600 text-sm bg-green-50 border border-green-200 rounded-xl px-4 py-3">✓ No exceptions match the current filters</div>
      )}
      {pageItems.map(exc => (
        <ExceptionCard key={exc.id} exc={exc} onResolved={onResolved} />
      ))}
      {totalPages > 1 && (
        <div className="flex items-center justify-between mt-3 text-xs text-gray-500">
          <span>Page {page + 1} of {totalPages} · {filtered.length} total</span>
          <div className="flex gap-2">
            <button onClick={() => setPage(p => Math.max(0, p - 1))} disabled={page === 0}
              className="px-3 py-1 bg-white border border-gray-200 rounded-lg hover:bg-gray-50 disabled:opacity-40 transition">← Prev</button>
            <button onClick={() => setPage(p => Math.min(totalPages - 1, p + 1))} disabled={page >= totalPages - 1}
              className="px-3 py-1 bg-white border border-gray-200 rounded-lg hover:bg-gray-50 disabled:opacity-40 transition">Next →</button>
          </div>
        </div>
      )}
    </section>
  );
}

// ─── ShipmentModal ──────────────────────────────────────────────────────────

function ShipmentModal({ shipmentId, onClose }) {
  const [detail, setDetail] = useState(null);
  const [loading, setLoading] = useState(true);

  useEffect(() => {
    fetch(`${API_BASE_URL}/shipments/${shipmentId}`)
      .then(r => r.json())
      .then(d => { setDetail(d); setLoading(false); })
      .catch(() => setLoading(false));
  }, [shipmentId]);

  const s = detail?.shipment || {};
  const events = detail?.events || [];

  return (
    <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/40 backdrop-blur-sm"
         onClick={onClose}>
      <div className="bg-white rounded-2xl shadow-2xl w-full max-w-2xl mx-4 max-h-[90vh] overflow-y-auto"
           onClick={e => e.stopPropagation()}>
        {/* Header */}
        <div className="flex items-center justify-between px-6 py-4 border-b border-gray-100">
          <h2 className="font-bold text-gray-800 text-lg font-mono">{shipmentId}</h2>
          <button onClick={onClose} className="text-gray-400 hover:text-gray-700 text-xl font-bold leading-none">&times;</button>
        </div>

        {loading && (
          <div className="py-12 text-center text-gray-400">Loading… <span className="spinner"></span></div>
        )}

        {!loading && detail && (
          <div className="px-6 py-4 space-y-5">
            {/* Shipment details grid */}
            <div>
              <h3 className="text-xs font-semibold uppercase text-gray-400 mb-2 tracking-wide">Shipment Details</h3>
              <div className="grid grid-cols-2 sm:grid-cols-3 gap-y-3 gap-x-6 text-sm">
                {[
                  ['Customer',      s.customer_id],
                  ['Carrier',       s.carrier_dot],
                  ['Mode',          s.mode],
                  ['Status',        s.status],
                  ['Commodity',     s.commodity],
                  ['Origin',        s.origin_state],
                  ['Destination',   s.destination_state],
                  ['ETA (h)',        s.eta_hours != null ? fmt(s.eta_hours, 1) : '—'],
                  ['Pred. ETA (h)', s.predicted_eta_hours != null ? fmt(s.predicted_eta_hours, 1) : '—'],
                  ['Value',         fmtUSD(s.freight_value_usd)],
                  ['Weight (tons)', s.weight_tons != null ? fmt(s.weight_tons, 2) : '—'],
                  ['Anomaly',       s.is_anomaly ? '⚠ Yes' : 'No'],
                  ['Carrier Status',s.carrier_status || '—'],
                  ['Last Update',   fmtDate(s.last_update)],
                  ['Created',       fmtDate(s.created_at)],
                ].map(([label, val]) => (
                  <div key={label}>
                    <div className="text-xs text-gray-400">{label}</div>
                    <div className="font-medium text-gray-800 truncate">{val ?? '—'}</div>
                  </div>
                ))}
              </div>
            </div>

            {/* Last 5 events */}
            <div>
              <h3 className="text-xs font-semibold uppercase text-gray-400 mb-2 tracking-wide">Last 5 Events</h3>
              {events.length === 0
                ? <p className="text-gray-400 text-sm">No events recorded.</p>
                : (
                <div className="space-y-2">
                  {events.map(ev => (
                    <div key={ev.id} className="flex items-start gap-3 text-xs bg-gray-50 rounded-lg px-3 py-2">
                      <div className="shrink-0 mt-0.5">{badge(ev.event_type, 'blue')}</div>
                      <div className="min-w-0">
                        <div className="text-gray-500">{fmtDate(ev.timestamp)}</div>
                        {ev.location && <div className="text-gray-700">📍 {ev.location}</div>}
                        {ev.note    && <div className="text-gray-600 italic">{ev.note}</div>}
                      </div>
                    </div>
                  ))}
                </div>
              )}
            </div>
          </div>
        )}

        {!loading && !detail && (
          <div className="py-8 text-center text-red-400 text-sm">Failed to load shipment details.</div>
        )}
      </div>
    </div>
  );
}

// ─── ShipmentsTable ───────────────────────────────────────────────────────────

const MODES    = ['', 'truck', 'rail', 'air', 'water', 'multimodal', 'pipeline', 'other'];
const STATUSES = ['', 'in_transit', 'picked_up', 'out_for_delivery', 'delivered', 'delayed', 'created'];

const SORT_FIELDS = {
  'ID':           'id',
  'Carrier':      'carrier_dot',
  'Mode':         'mode',
  'Status':       'status',
  'Last Update':  'last_update',
  'ETA (h)':      'eta_hours',
  'Value':        'freight_value_usd',
  'Anomaly':      'is_anomaly',
};

function ShipmentsTable() {
  const [shipments, setShipments] = useState([]);
  const [total, setTotal]         = useState(0);
  const [page, setPage]           = useState(0);
  const [mode, setMode]           = useState('');
  const [status, setStatus]       = useState('');
  const [loading, setLoading]     = useState(true);
  const [modalId, setModalId]     = useState(null);
  const [sort, setSort]           = useState('created_at');
  const [sortDir, setSortDir]     = useState('desc');
  const PAGE_SIZE = 100;

  function onSortClick(col) {
    const field = SORT_FIELDS[col];
    if (!field) return;
    if (field === sort) {
      setSortDir(d => d === 'desc' ? 'asc' : 'desc');
    } else {
      setSort(field);
      setSortDir('desc');
    }
    setPage(0);
  }

  const load = useCallback(() => {
    const params = new URLSearchParams({ limit: PAGE_SIZE, offset: page * PAGE_SIZE, sort, sort_dir: sortDir, sort, sort_dir: sortDir });
    if (mode)   params.set('mode', mode);
    if (status) params.set('status', status);
    fetch(`${API_BASE_URL}/shipments?${params}`)
      .then(r => r.json())
      .then(d => { setShipments(d.shipments); setTotal(d.total); setLoading(false); })
      .catch(() => setLoading(false));
  }, [page, mode, status, sort, sortDir]);

  useEffect(() => { setLoading(true); load(); }, [load]);
  useEffect(() => { const t = setInterval(load, 30_000); return () => clearInterval(t); }, [load]);

  function onFilterChange(setter) {
    return e => { setter(e.target.value); setPage(0); };
  }

  const totalPages = Math.ceil(total / PAGE_SIZE);

  return (
    <section>
      <div className="flex flex-wrap items-center justify-between gap-3 mb-3">
        <h2 className="text-sm font-semibold uppercase text-gray-500 tracking-wide">
          Shipments {!loading && <span className="text-indigo-600">({fmt(total)})</span>}
          <span className="text-gray-400 font-normal normal-case ml-1">(auto-refresh 30s)</span>
        </h2>
        <div className="flex gap-2">
          <select value={mode} onChange={onFilterChange(setMode)}
            className="text-sm border border-gray-200 rounded-lg px-2 py-1 bg-white focus:outline-none focus:ring-2 focus:ring-indigo-300">
            {MODES.map(m => <option key={m} value={m}>{m || 'All Modes'}</option>)}
          </select>
          <select value={status} onChange={onFilterChange(setStatus)}
            className="text-sm border border-gray-200 rounded-lg px-2 py-1 bg-white focus:outline-none focus:ring-2 focus:ring-indigo-300">
            {STATUSES.map(s => <option key={s} value={s}>{s || 'All Statuses'}</option>)}
          </select>
        </div>
      </div>

      <div className="bg-white rounded-xl shadow-sm border border-gray-100 overflow-x-auto">
        {loading
          ? <div className="text-gray-400 text-sm py-8 text-center">Loading… <span className="spinner"></span></div>
          : (
          <table className="min-w-full text-xs">
            <thead className="bg-gray-50 border-b border-gray-200">
              <tr>
                {['ID','Carrier','Route','Mode','Commodity','Status','Last Update','ETA (h)','Pred. ETA (h)','Value','Anomaly'].map(h => {
                  const field = SORT_FIELDS[h];
                  const active = field && field === sort;
                  return (
                    <th key={h}
                      onClick={() => onSortClick(h)}
                      className={`px-3 py-2.5 text-left font-semibold text-gray-500 whitespace-nowrap ${
                        field ? 'cursor-pointer select-none hover:text-indigo-600' : ''
                      } ${active ? 'text-indigo-600' : ''}`}>
                      {h}{active ? (sortDir === 'desc' ? ' ↓' : ' ↑') : (field ? ' ↕' : '')}
                    </th>
                  );
                })}
              </tr>
            </thead>
            <tbody>
              {shipments.map(s => (
                <tr key={s.id} className={`border-b border-gray-100 hover:brightness-95 transition ${rowColor(s)}`}>
                  <td className="px-3 py-2 font-mono font-semibold text-indigo-700 whitespace-nowrap">
                    <button onClick={() => setModalId(s.id)}
                      className="hover:underline focus:outline-none">{s.id}</button>
                  </td>
                  <td className="px-3 py-2 text-gray-600 whitespace-nowrap max-w-[120px] truncate" title={s.carrier_dot}>{s.carrier_dot}</td>
                  <td className="px-3 py-2 text-gray-600 whitespace-nowrap">{s.origin_state?.slice(0,4)}…→{s.destination_state?.slice(0,4)}…</td>
                  <td className="px-3 py-2">{badge(s.mode, 'blue')}</td>
                  <td className="px-3 py-2 text-gray-600 max-w-[120px] truncate" title={s.commodity}>{s.commodity}</td>
                  <td className="px-3 py-2 whitespace-nowrap">{badge(s.status, s.status === 'delivered' ? 'green' : s.status === 'delayed' ? 'red' : 'gray')}</td>
                  <td className="px-3 py-2 text-gray-500 whitespace-nowrap">{fmtDate(s.last_update)}</td>
                  <td className="px-3 py-2 text-right">{fmt(s.eta_hours, 1)}</td>
                  <td className="px-3 py-2 text-right text-indigo-600">{s.predicted_eta_hours ? fmt(s.predicted_eta_hours, 1) : '—'}</td>
                  <td className="px-3 py-2 text-right font-medium">{fmtUSD(s.freight_value_usd)}</td>
                  <td className="px-3 py-2 text-center">{s.is_anomaly ? badge('⚠ Yes', 'purple') : ''}</td>
                </tr>
              ))}
              {shipments.length === 0 && (
                <tr><td colSpan={11} className="px-3 py-6 text-center text-gray-400">No shipments found</td></tr>
              )}
            </tbody>
          </table>
        )}
      </div>

      {/* Pagination */}
      {totalPages > 1 && (
        <div className="flex items-center justify-between mt-3 text-xs text-gray-500">
          <span>Page {page + 1} of {totalPages} · {fmt(total)} total</span>
          <div className="flex gap-2">
            <button onClick={() => setPage(p => Math.max(0, p - 1))} disabled={page === 0}
              className="px-3 py-1 bg-white border border-gray-200 rounded-lg hover:bg-gray-50 disabled:opacity-40 transition">← Prev</button>
            <button onClick={() => setPage(p => Math.min(totalPages - 1, p + 1))} disabled={page >= totalPages - 1}
              className="px-3 py-1 bg-white border border-gray-200 rounded-lg hover:bg-gray-50 disabled:opacity-40 transition">Next →</button>
          </div>
        </div>
      )}

      {modalId && <ShipmentModal shipmentId={modalId} onClose={() => setModalId(null)} />}
    </section>
  );
}

// ─── App ─────────────────────────────────────────────────────────────────────

const TABS = ['Exceptions', 'All Shipments'];

function App() {
  const [health, setHealth]   = useState(null);
  const [activeTab, setActiveTab] = useState('Exceptions');

  useEffect(() => {
    function checkHealth() {
      fetch(`${API_BASE_URL}/health`).then(r => r.json()).then(setHealth).catch(() => setHealth(null));
    }
    checkHealth();
    const t = setInterval(checkHealth, 30_000);
    return () => clearInterval(t);
  }, []);

  return (
    <div className="min-h-screen bg-slate-50">
      <Header health={health} />
      <main className="max-w-screen-2xl mx-auto px-4 sm:px-6 py-6">
        <PipelineMetrics />

        {/* Tab bar */}
        <div className="flex gap-1 mb-5 border-b border-gray-200">
          {TABS.map(tab => (
            <button key={tab} onClick={() => setActiveTab(tab)}
              className={`px-5 py-2 text-sm font-medium rounded-t-lg transition ${
                activeTab === tab
                  ? 'bg-white border border-b-white border-gray-200 text-indigo-700 -mb-px'
                  : 'text-gray-500 hover:text-gray-700'
              }`}>
              {tab}
            </button>
          ))}
        </div>

        {activeTab === 'Exceptions'    && <ExceptionsPanel />}
        {activeTab === 'All Shipments' && <ShipmentsTable />}
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
